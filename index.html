<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜡笔的公众号排版器</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#6B2303;--primary:#6B2303;--brand-soft:#FFF3EC;--bg:#F7F8FA;--white:#FFFFFF;--border:#E5E7EB;
  --text:#333;--text2:#666;--text3:#999;--radius:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
html{font-size:14px}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-width:768px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:var(--brand)}
input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CCC;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#AAA}

/* ===== Top Nav ===== */
.top-nav{display:flex;align-items:center;height:60px;background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;flex-shrink:0;z-index:100}
.logo{font-size:24px;font-weight:800;color:var(--brand);margin-right:36px;white-space:nowrap;letter-spacing:0}
.logo span{font-size:13px;font-weight:500;color:rgba(107,35,3,.48);margin-left:8px}
.nav-group{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap;overflow-x:auto}
.nav-btn{padding:7px 14px;border-radius:var(--radius);font-size:13px;color:var(--brand);transition:all .2s;white-space:nowrap}
.nav-btn:hover{background:var(--brand-soft);color:var(--brand)}
.nav-btn.active{background:var(--brand-soft);color:var(--brand);box-shadow:inset 0 0 0 1px rgba(107,35,3,.16)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.usage-count{font-size:12px;color:rgba(107,35,3,.48);white-space:nowrap;padding:0 4px}
.nav-right .nav-btn{font-size:13px}

/* ===== Main Layout ===== */
.main{display:flex;flex:1;overflow:hidden;position:relative}
.panel{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.panel-left{width:45%;min-width:300px;border-right:none}
.panel-right{width:55%;min-width:350px;background:#F0F1F3}
.divider{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;position:relative;z-index:10;transition:background .2s}
.divider:hover,.divider.active{background:var(--primary)}

/* ===== Editor Toolbar ===== */
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:6px 12px;background:var(--white);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.tb-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:14px;color:var(--brand);transition:all .15s;font-weight:400}
.tb-btn:hover{background:var(--brand-soft);color:var(--brand)}
.tb-btn.active{background:var(--brand-soft);color:var(--brand)}
.tb-btn b{font-size:15px}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tb-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--brand);background:var(--white);outline:none;cursor:pointer}
.tb-select:focus{border-color:var(--primary)}

/* ===== Editor Area ===== */
.editor-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.editor{flex:1;padding:24px 28px;overflow-y:auto;outline:none;font-size:15px;line-height:1.8;color:var(--text);background:var(--white)}
.editor:empty::before{content:attr(data-placeholder);color:#CCC;pointer-events:none}
.editor img{max-width:100%;height:auto;border-radius:12px;margin:8px 0;display:block}
.editor img[draggable="true"]{cursor:grab}
.editor img.editor-img-drop-target{outline:2px dashed var(--primary);outline-offset:3px}
.editor-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 16px;background:var(--white);border-top:1px solid var(--border);font-size:12px;color:var(--text3);flex-shrink:0}
.editor-footer-left{display:flex;align-items:center;gap:10px;min-width:0}
.clear-editor-btn{height:26px;padding:0 10px;border:1px solid rgba(107,35,3,.18);border-radius:4px;background:#FFF7F2;color:var(--brand);font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s}
.clear-editor-btn:hover{background:var(--brand-soft);border-color:rgba(107,35,3,.28)}
.draft-editor-btn{height:26px;padding:0 10px;border:1px solid rgba(30,58,95,.2);border-radius:4px;background:#F5F9FF;color:#1E3A5F;font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s}
.draft-editor-btn:hover{background:#EAF2FF;border-color:rgba(30,58,95,.32)}

/* ===== Preview Area ===== */
.preview-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.preview-toolbar .label{font-size:13px;font-weight:600;color:var(--text)}
.preview-toolbar .spacer{flex:1}
.mobile-toggle{padding:4px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--brand);transition:all .2s}
.mobile-toggle:hover{border-color:var(--primary);color:var(--primary)}
.mobile-toggle.active{background:var(--brand-soft);color:var(--brand);border-color:rgba(107,35,3,.24)}
.preview-wrap{flex:1;overflow-y:auto;background:#F0F1F3;display:flex;justify-content:center;padding:16px}
.preview-frame{width:100%;max-width:100%;background:var(--white);box-shadow:var(--shadow);transition:max-width .3s,box-shadow .3s}
.preview-frame.mobile{max-width:375px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.preview-content{padding:32px 24px;font-size:15px;line-height:1.75;color:#333;word-wrap:break-word;overflow-wrap:break-word}
.preview-content img{max-width:100%;height:auto;border-radius:12px}
.preview-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:var(--white);border-top:1px solid var(--border);font-size:12px;color:var(--text3);flex-shrink:0}

/* ===== Bottom Bar ===== */
.bottom-bar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.bottom-bar .spacer{flex:1}
.btn-primary{padding:8px 20px;border-radius:var(--radius);background:var(--brand-soft);border:1px solid rgba(107,35,3,.18);color:var(--brand);font-size:13px;font-weight:700;transition:all .2s}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary.success{background:#10B981;color:#FFF;border-color:#10B981}
.btn-secondary{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);color:var(--brand);font-size:13px;transition:all .2s}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-secondary.success{background:#10B981;color:#FFF;border-color:#10B981}

/* ===== Settings Panel (right side overlay) ===== */
.settings-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;display:none;opacity:0;transition:opacity .2s}
.settings-overlay.show{display:flex;opacity:1}
.settings-panel{position:fixed;top:0;right:0;width:380px;height:100%;background:var(--white);box-shadow:-4px 0 24px rgba(0,0,0,.1);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.settings-panel.show{transform:translateX(0)}
.sp-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.sp-header h3{font-size:16px;flex:1}
.sp-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:18px;color:var(--brand);transition:all .2s}
.sp-close:hover{background:#F0F1F3;color:var(--text)}
.sp-body{flex:1;overflow-y:auto;padding:16px 20px}
.sp-section{margin-bottom:20px}
.sp-section h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sp-row label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0}
.sp-row select,.sp-row input[type=text],.sp-row input[type=number]{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none}
.sp-row select:focus,.sp-row input:focus{border-color:var(--primary)}
.sp-row input[type=color]{width:32px;height:32px;padding:2px;border:1px solid var(--border);border-radius:4px;cursor:pointer}
.color-chip{width:28px;height:28px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:all .15s;overflow:hidden;background:#fff;display:grid;grid-template-columns:1.35fr 1fr 1fr;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.color-chip span{display:block;min-width:0}
.color-chip:hover,.color-chip.active{border-color:var(--primary);transform:scale(1.1)}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.custom-color-grid{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;margin-top:8px}
.custom-color-grid label{font-size:11px;color:var(--text3)}
.custom-color-grid input[type=text]{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;width:80px}
.custom-color-grid input[type=color]{width:28px;height:28px;border:1px solid var(--border);border-radius:4px;padding:1px}
.custom-palette-slots{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.custom-palette-slot{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:6px;background:#fff}
.custom-palette-slot.empty{background:#FAFAFA;color:var(--text3)}
.custom-palette-slot.active{border-color:var(--primary);box-shadow:0 0 0 1px rgba(107,35,3,.08)}
.slot-chip{width:28px;height:28px;border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.08);display:grid;grid-template-columns:1.35fr 1fr 1fr;background:#F4F4F5}
.slot-chip span{display:block;min-width:0}
.slot-info{min-width:0;font-size:12px;color:var(--text)}
.slot-info small{display:block;margin-top:2px;color:var(--text3);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-actions{display:flex;gap:4px;align-items:center}
.slot-actions button{height:24px;padding:0 7px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--brand);font-size:11px;white-space:nowrap}
.slot-actions button:hover{border-color:var(--primary);color:var(--primary)}

/* ===== Mode Cards ===== */
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-card{padding:10px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{border-color:#BBB}
.mode-card.active{border-color:var(--primary);background:#F0F5FF}
.mode-card .mc-name{font-size:12px;font-weight:600;color:var(--text)}
.mode-card .mc-desc{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== Modal ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:12px;padding:24px;width:440px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:16px;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal input[type=text]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none}
.modal input[type=text]:focus{border-color:var(--primary)}

/* ===== Saved Styles Dropdown ===== */
.styles-dropdown{position:absolute;top:100%;right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:260px;max-height:360px;overflow-y:auto;z-index:150;display:none}
.styles-dropdown.show{display:block}
.sd-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #F0F1F3;transition:background .15s}
.sd-item:hover{background:#F7F8FA}
.sd-item:last-child{border-bottom:none}
.sd-item .sd-name{flex:1;font-size:13px;cursor:pointer}
.sd-item .sd-actions{display:flex;gap:4px}
.sd-item .sd-actions button{font-size:11px;padding:2px 6px;border-radius:3px;color:var(--brand)}
.sd-item .sd-actions button:hover{background:#F0F1F3;color:var(--text)}
.sd-empty{padding:16px;text-align:center;color:var(--text3);font-size:13px}

/* Image Insert Panel */
.img-panel{position:absolute;top:100%;left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);width:370px;padding:16px;z-index:250;display:none}
.img-panel.show{display:block}
.img-panel h4{font-size:13px;margin-bottom:10px}
.img-panel .tab-row{display:flex;gap:4px;margin-bottom:12px}
.img-panel .tab-btn{padding:4px 12px;border-radius:4px;font-size:12px;color:var(--brand);border:1px solid var(--border)}
.img-panel .tab-btn.active{background:var(--brand-soft);color:var(--brand);border-color:rgba(107,35,3,.24)}
.img-panel input[type=text]{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;margin-bottom:8px}
.img-panel .img-options{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.img-panel .img-options select,.img-panel .img-options input{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px}
.img-panel .img-insert-btn{padding:6px 16px;background:var(--brand-soft);color:var(--brand);border:1px solid rgba(107,35,3,.18);border-radius:4px;font-size:12px;width:100%;font-weight:700}
.img-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;color:var(--text3);font-size:12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.img-upload-area:hover{border-color:var(--primary);color:var(--primary)}
.img-upload-area input[type=file]{display:none}
.img-layout-note{font-size:11px;color:var(--text3);line-height:1.5;margin:-2px 0 8px}
.hr-panel{position:absolute;top:100%;left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);width:220px;padding:10px;z-index:240;display:none}
.hr-panel.show{display:block}
.hr-option{width:100%;padding:8px 10px;border-radius:4px;color:var(--brand);font-size:12px;text-align:left;display:block}
.hr-option:hover{background:var(--brand-soft)}
.hr-preview{display:flex;align-items:center;gap:6px;margin-top:4px;color:var(--text3)}
.hr-preview span{display:inline-block}
.align-panel{position:absolute;top:100%;left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);width:132px;padding:6px;z-index:245;display:none}
.align-panel.show{display:block}
.align-option{width:100%;height:30px;display:flex;align-items:center;gap:8px;padding:0 8px;border-radius:4px;color:var(--brand);font-size:12px;text-align:left}
.align-option:hover,.align-option.active{background:var(--brand-soft)}
.align-option .icon{width:18px;text-align:center;font-size:14px}
.list-panel{position:absolute;top:100%;left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);width:132px;padding:6px;z-index:245;display:none}
.list-panel.show{display:block}
.list-option{width:100%;height:30px;display:flex;align-items:center;gap:8px;padding:0 8px;border-radius:4px;color:var(--brand);font-size:12px;text-align:left}
.list-option:hover,.list-option.active{background:var(--brand-soft)}
.list-option .icon{width:18px;text-align:center;font-size:14px}

/* ===== Help Modal ===== */
.help-content{font-size:13px;line-height:1.8;color:var(--text2)}
.help-content h4{color:var(--text);margin:12px 0 4px;font-size:14px}
.help-content kbd{padding:1px 6px;background:#F0F1F3;border:1px solid var(--border);border-radius:3px;font-size:12px;font-family:monospace}
.help-content ul{padding-left:16px;margin:4px 0}
.help-qr{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.help-qr-title{font-size:14px;font-weight:700;color:var(--brand);margin-bottom:8px}
.help-qr img{width:180px;height:180px;object-fit:contain;border-radius:8px;border:1px solid var(--border);background:#fff}
.help-qr-note{font-size:12px;color:var(--text3);margin-top:6px}

/* ===== Responsive ===== */
@media(max-width:900px){
  .mode-cards{grid-template-columns:1fr}
  .settings-panel{width:320px}
}
</style>
</head>
<body>

<!-- ===== Top Nav ===== -->
<nav class="top-nav">
  <div class="logo">蜡笔的公众号排版器<span>v4.0</span></div>
  <div class="nav-group">
    <button class="nav-btn active" onclick="openSettings('mode')" id="btnMode">排版模式</button>
    <button class="nav-btn" onclick="openSettings('font')">字体</button>
    <button class="nav-btn" onclick="openSettings('color')">配色</button>
    <button class="nav-btn" onclick="openSettings('spacing')">行距/段距</button>
    <button class="nav-btn" onclick="openSettings('bg')">背景</button>
  </div>
  <div class="nav-right" style="position:relative">
    <button class="nav-btn" onclick="toggleStylesDropdown()" id="btnMyStyles">我的样式 ▾</button>
    <div class="styles-dropdown" id="stylesDropdown"></div>
    <button class="nav-btn" onclick="showHelp()">帮助</button>
    <span class="usage-count" id="usageCount" title="当前浏览器本地累计打开次数">使用 0 次</span>
  </div>
</nav>

<!-- ===== Main ===== -->
<div class="main" id="mainArea">
  <!-- Left: Editor -->
  <div class="panel panel-left" id="panelLeft">
    <div class="editor-toolbar">
      <button class="tb-btn" id="btnBold" title="加粗" onclick="execCmd('bold')"><b>B</b></button>
      <button class="tb-btn" id="btnItalic" title="斜体" onclick="execCmd('italic')"><i>I</i></button>
      <span class="tb-sep"></span>
      <select class="tb-select" onchange="execHeading(this.value);this.value=''" title="标题级别">
        <option value="">标题</option>
        <option value="P">正文</option>
        <option value="H1">H1</option>
        <option value="H2">H2</option>
        <option value="H3">H3</option>
      </select>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btnQuote" title="引用" onclick="execCmd('formatBlock','BLOCKQUOTE')">❝</button>
      <button class="tb-btn" title="代码块" onclick="insertCodeBlock()">⟨/⟩</button>
      <div style="position:relative">
        <button class="tb-btn" id="btnAlign" title="文本对齐" onclick="toggleAlignPanel()">↔</button>
        <div class="align-panel" id="alignPanel">
          <button class="align-option" id="alignOptionLeft" onclick="chooseTextAlign('left')"><span class="icon">↤</span>左对齐</button>
          <button class="align-option" id="alignOptionCenter" onclick="chooseTextAlign('center')"><span class="icon">↔</span>居中</button>
          <button class="align-option" id="alignOptionRight" onclick="chooseTextAlign('right')"><span class="icon">↦</span>右对齐</button>
        </div>
      </div>
      <div style="position:relative">
        <button class="tb-btn" id="btnList" title="列表" onclick="toggleListPanel()">•≡</button>
        <div class="list-panel" id="listPanel">
          <button class="list-option" id="listOptionUl" onclick="chooseList('insertUnorderedList')"><span class="icon">•≡</span>无序列表</button>
          <button class="list-option" id="listOptionOl" onclick="chooseList('insertOrderedList')"><span class="icon">1.</span>有序列表</button>
        </div>
      </div>
      <span class="tb-sep"></span>
      <div style="position:relative">
        <button class="tb-btn" title="插入图片" onclick="toggleImgPanel()" id="btnImg">📷</button>
        <div class="img-panel" id="imgPanel">
          <h4>插入图片</h4>
          <div class="tab-row">
            <button class="tab-btn active" onclick="switchImgTab('upload',this)">本地上传</button>
            <button class="tab-btn" onclick="switchImgTab('url',this)">URL地址</button>
          </div>
          <div class="img-options">
            <label style="font-size:11px;color:#666;margin-right:2px">布局</label>
            <select id="imgLayout" onchange="switchImgLayout(this.value)">
              <option value="single">单张图片</option>
              <option value="double">双图并排</option>
            </select>
          </div>
          <div class="img-layout-note" id="imgLayoutNote">单张图片适合封面、长图和正文配图。</div>
          <div id="imgTabUpload">
            <div class="img-upload-area" onclick="document.getElementById('imgFileInput').click()">
              点击选择图片，双图并排可一次选择2张
              <input type="file" id="imgFileInput" accept="image/png,image/jpeg,image/gif,image/webp" onchange="handleImgFile(this)" multiple>
            </div>
          </div>
          <div id="imgTabUrl" style="display:none">
            <input type="text" id="imgUrlInput" placeholder="输入图片URL地址">
            <input type="text" id="imgUrlInput2" placeholder="双图并排时输入第二张图片URL" style="display:none">
          </div>
          <div class="img-options">
            <select id="imgAlign">

    const el = getElementFromNode(node);

    const component = el.closest?.('[data-theme-component]');
    if (component && editor.contains(component)) targets.add(component);
    const block = el.closest?.(selector);
    if (block && editor.contains(block) && block !== editor) targets.add(block);

  addTarget(range.startContainer);
  addTarget(range.endContainer);
  editor.querySelectorAll(selector).forEach(el => {

const WECHAT_MODE_SAFE = {
  text: '#767676',
  muted: '#888888',
  emphasis: '#5F7899',
  heading: '#5A7290',
  border: '#8A8A8A',
  light: '#FFFFFF'
};

function isTransparentCss(value) {
  const v = String(value || '').trim().toLowerCase();
  return !v || v === 'transparent' || v === 'none' || v === 'rgba(0, 0, 0, 0)' || v === 'rgba(0,0,0,0)';
}

function isWhiteCss(value) {
  const v = String(value || '').trim().toLowerCase().replace(/\s+/g, '');
  return v === '#fff' || v === '#ffffff' || v === 'white' || v === 'rgb(255,255,255)' || v === 'rgba(255,255,255,1)';
}

function parseCssRgb(value) {
  let v = String(value || '').trim().toLowerCase();
  if (!v || v === 'transparent' || v === 'none') return null;
  if (v === 'white') v = '#ffffff';
  if (v === 'black') v = '#000000';
  let m = v.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
  if (m) {
    let hex = m[1];
    if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
    return [parseInt(hex.slice(0, 2), 16), parseInt(hex.slice(2, 4), 16), parseInt(hex.slice(4, 6), 16)];
  }
  m = v.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/i);
  if (m) return [Number(m[1]), Number(m[2]), Number(m[3])];
  m = v.match(/#([0-9a-f]{6}|[0-9a-f]{3})/i) || v.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/i);
  if (m && m[0].startsWith('#')) return parseCssRgb(m[0]);
  if (m) return [Number(m[1]), Number(m[2]), Number(m[3])];
  return null;
}

function relativeLuminance(rgb) {
  const vals = rgb.map(v => {
    const n = Math.max(0, Math.min(255, v)) / 255;
    return n <= 0.03928 ? n / 12.92 : Math.pow((n + 0.055) / 1.055, 2.4);
  });
  return vals[0] * 0.2126 + vals[1] * 0.7152 + vals[2] * 0.0722;
}

function contrastRatio(rgbA, rgbB) {
  const a = relativeLuminance(rgbA);
  const b = relativeLuminance(rgbB);
  const hi = Math.max(a, b);
  const lo = Math.min(a, b);
  return (hi + 0.05) / (lo + 0.05);
}

function hasOwnVisibleBackground(el) {
  if (!el?.style) return false;
  const bg = el.style.background || '';
  const bgColor = el.style.backgroundColor || '';
  const bgImage = el.style.backgroundImage || '';
  return !isTransparentCss(bg) || !isTransparentCss(bgColor) || !isTransparentCss(bgImage);
}

function nearestBackgroundRgb(el) {
  let node = el;
  while (node && node.nodeType === Node.ELEMENT_NODE) {
    const rgb = parseCssRgb(node.style.backgroundColor) || parseCssRgb(node.style.background) || parseCssRgb(node.style.backgroundImage);
    if (rgb) return rgb;
    node = node.parentElement;
  }
  return null;
}

function hasReadableColorOnBackground(el) {
  const fg = parseCssRgb(el?.style?.color);
  const bg = nearestBackgroundRgb(el);
  if (!fg || !bg) return false;
  return contrastRatio(fg, bg) >= 3.4;
}

function hasDarkReadableBackgroundForWhite(el) {
  const bg = nearestBackgroundRgb(el);
  if (!bg) return false;
  return contrastRatio([255, 255, 255], bg) >= 3.4;
}

function hasColoredReadableBackground(el) {
  let node = el;
  while (node && node.nodeType === Node.ELEMENT_NODE) {
    if (hasOwnVisibleBackground(node) && !isWhiteCss(node.style.background) && !isWhiteCss(node.style.backgroundColor)) return hasReadableColorOnBackground(el);
    node = node.parentElement;
  }
  return false;
}

function removeImageAndTrailingBreak(img) {
  if (!img || !img.parentNode) return;
  const parent = img.parentNode;
  const next = img.nextSibling;
  img.remove();
  if (next && next.nodeType === Node.ELEMENT_NODE && next.tagName === 'BR') next.remove();
  if (parent !== editor && parent.nodeType === Node.ELEMENT_NODE) {
    const hasMeaningfulContent = (parent.textContent || '').trim() || parent.querySelector('img,table,hr,blockquote,h1,h2,h3,pre,ul,ol,section');
    if (!hasMeaningfulContent) parent.remove();
  }
}

function swapPairImages(a, b) {
  const aCell = a?.closest?.('td');
  const bCell = b?.closest?.('td');
  if (!aCell || !bCell || aCell === bCell) return false;
  const tmp = aCell.innerHTML;
  aCell.innerHTML = bCell.innerHTML;
  bCell.innerHTML = tmp;
  enableEditorImageDragHandles();
  return true;
}

function pairEditorImages(a, b) {
  if (!a || !b || a === b) return false;
  const aPair = getImagePairTable(a);
  const bPair = getImagePairTable(b);
  if (aPair || bPair) {
    if (aPair && aPair === bPair) return swapPairImages(a, b);
    return false;
  }
  const follows = !!(a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING);
  const first = follows ? a : b;
  const second = follows ? b : a;
  const firstSrc = sanitizeImageSrc(first.getAttribute('src') || first.src);
  const secondSrc = sanitizeImageSrc(second.getAttribute('src') || second.src);
  if (!firstSrc || !secondSrc) return false;
  const radius = parseCssNumber(first.style.borderRadius || second.style.borderRadius) ?? 12;
  const html = buildImagePairHTML([firstSrc, secondSrc], { align: 'center', width: 100, radius });
  if (!html) return false;
  const tpl = document.createElement('template');
  tpl.innerHTML = sanitizeContentHTML(html);
  first.parentNode.insertBefore(tpl.content, first);
  removeImageAndTrailingBreak(first);
  removeImageAndTrailingBreak(second);
  enableEditorImageDragHandles();
  return true;
}

function setupEditorImageDragEvents() {

    e.dataTransfer.setData('text/plain', 'editor-image');
  });
  editor.addEventListener('dragover', e => {
    const target = getEditorImageFromNode(e.target);
    clearImageDropTargets();
    if (!draggedEditorImage || !target || target === draggedEditorImage) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    target.classList.add('editor-img-drop-target');
  });
  editor.addEventListener('drop', e => {
    const target = getEditorImageFromNode(e.target);
    if (!draggedEditorImage || !target || target === draggedEditorImage) return;
    e.preventDefault();
    if (pairEditorImages(draggedEditorImage, target)) {
      ensureEndingBlockAtEnd();
      scheduleUpdate();
    }
    draggedEditorImage = null;
    clearImageDropTargets();
  });
  editor.addEventListener('dragend', () => {
    draggedEditorImage = null;
    clearImageDropTargets();
    scheduleUpdate();
  });
}

function applyTextHighlight() {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) {
    alert('请先选中要高亮的文字');
    return;
  }
  const range = getSelectionRangeInEditor();
  if (!range) return;
  const existing = getIntersectingHighlights(range);
  if (existing.length) {
    existing.forEach(unwrapElement);
    editor.focus();
    scheduleUpdate();
    updateToolbarStates();
    return;
  }
  const c = getColors();
  const color = c.main || '#133363';
  const selectedHTML = getRangeHTML(range);
  document.execCommand('insertHTML', false, `<span data-editor-highlight="true" style="color:${color};font-weight:700">${selectedHTML}</span>`);
  editor.focus();
  scheduleUpdate();
  updateToolbarStates();
}

function getEditorHighlight(node) {
  let el = getElementFromNode(node);
  while (el && el !== editor) {
    if (el.getAttribute('data-editor-highlight') === 'true') return el;
    el = el.parentElement;
  }
  return null;
}

function isSelectionInEditorHighlight() {
  const range = getSelectionRangeInEditor();
  if (!range) return false;
  return !!getEditorHighlight(range.startContainer) && !!getEditorHighlight(range.endContainer);
}

function getIntersectingHighlights(range) {
  const highlights = new Set();
  const start = getEditorHighlight(range.startContainer);
  const end = getEditorHighlight(range.endContainer);
  if (start) highlights.add(start);
  if (end) highlights.add(end);
  editor.querySelectorAll('[data-editor-highlight="true"]').forEach(el => {
    try {
      if (range.intersectsNode(el)) highlights.add(el);
    } catch (e) {}
  });
  return Array.from(highlights);
}

function getRangeHTML(range) {
  const holder = document.createElement('div');
  holder.appendChild(range.cloneContents());
  return sanitizeContentHTML(holder.innerHTML || escapeHtml(range.toString()));
}

function getRangeTextAsParagraphs(range) {
  return String(range?.toString() || '')
    .split(/\n{1,}/)
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => `<p>${escapeHtml(line)}</p>`)
    .join('');
}

function unwrapElement(el) {
  if (!el || !el.parentNode) return;
  const parent = el.parentNode;
  while (el.firstChild) parent.insertBefore(el.firstChild, el);
  parent.removeChild(el);
  parent.normalize();
}

function normalizeTipCardBodyHTML(html, textColor) {
  const tpl = document.createElement('template');

  if (!hasBlock) {

  }
  const wrapper = document.createElement('section');

const PREPROCESS_MODE_CONFIG = {
  clean: {
    name: '保守整理',
    desc: '清理空行，识别明确标题、列表和引用，不主动新增小标题。'

function isConservativeHeadingLine(text, prevLine = '', nextLine = '') {
  const s = String(text || '').trim();
  if (!s) return false;
  if (s.length > 24) return false;
  if (/[。！？!?；;]/.test(s)) return false;
  if (/[，,]/.test(s)) return false;
  if (/^(但|但是|而是|而且|所以|因此|如果|因为|同时|然后|好像|这些|这个|这就|于是|不过|其实|只是|甚至)/.test(s)) return false;

  const prevBlank = !String(prevLine || '').trim();
  const nextBlank = !String(nextLine || '').trim();
  const isolated = prevBlank || nextBlank;
  const numberedHeading = /^(第?[一二三四五六七八九十百千万\d]{1,3}[章节部分条点、.．)）:：]\s*)\S+/.test(s);
  const compactColonHeading = /^[^:：]{2,10}[:：]$/.test(s) && !/[的了是在把被会让让人我们你我他她它]/.test(s.replace(/[:：]$/, ''));
  const commonLabelHeading = /^(前言|导语|引言|目录|摘要|背景|问题|方法|案例|步骤|清单|总结|小结|复盘|结论|写在最后|今日小结|核心观点|重点提示|注意事项)$/.test(s.replace(/[:：]$/, ''));
  const shortIsolatedTitle = isolated && s.length <= 12 && !/[的了是在把被会让]/.test(s) && !/[:：]$/.test(s);

  return numberedHeading || compactColonHeading || commonLabelHeading || shortIsolatedTitle;
}

function isModeHeadingLine(text, mode) {
  const s = String(text || '').trim().replace(/[:：]$/, '');
  if (!s || s.length > 28) return false;
  if (/[。！？!?；;，,]/.test(s)) return false;

  const tutorialLabels = /^(准备工作|前置准备|操作步骤|具体步骤|步骤一|步骤二|步骤三|第一步|第二步|第三步|第四步|注意事项|常见问题|避坑提醒|使用方法|实操流程|案例演示|最终效果)$/;
  const recommendLabels = /^(推荐理由|适合人群|不适合谁|核心亮点|主要优点|缺点不足|使用体验|购买建议|价格参考|总结|一句话总结|我的感受|真实体验)$/;
  const spokenLabels = /^(先说结论|说个重点|还有一点|换句话说|最后总结|讲个例子|重点来了)$/;

  if (mode === 'tutorial') return tutorialLabels.test(s);
  if (mode === 'recommend') return recommendLabels.test(s);
  if (mode === 'spoken') return spokenLabels.test(s);
  return false;
}

function summarizeHeadingCandidate(text) {
  let s = String(text || '').trim().replace(/[:：]\s*$/, '');
  if (!s || s.length > 42) return '';
  if (!/[:：]$/.test(String(text || '').trim())) return '';

  const keywordRules = [
    { re: /不适感|不舒服|不安|焦虑|压力/, title: '不适感' },
    { re: /另一件事|另一层问题/, title: '另一件事' },
    { re: /奇怪的结构|结构/, title: '奇怪结构' },
    { re: /AI的意义|意义/, title: 'AI的意义' },
    { re: /成本|效率|收入|消费/, title: '效率与成本' },
    { re: /总结|小结|复盘/, title: '小结' }
  ];
  const matched = keywordRules.find(rule => rule.re.test(s));
  if (matched) return matched.title;

  const parts = s.split(/[，,；;]/).map(x => x.trim()).filter(Boolean);
  let core = parts.length > 1 ? parts[parts.length - 1] : s;
  core = core
    .replace(/^(这就|这是|这些|这种|那就是|而是|但是|但|所以|因此|然后|其实|只是|好像)/, '')
    .replace(/^(会让人|让人|让我们|让你|让他|让她|产生了?|形成了?|变成了?|带来了?|导致了?)/, '')
    .replace(/^(一个|一种|一件|很强的|很大的|很奇怪的|很明显的|真正的|了一个|了一种|了一件)/, '')
    .replace(/^(的|了|是)/, '')
    .trim();

  core = core.replace(/[“”"']/g, '').replace(/\s+/g, '');
  if (!core || core.length < 3) return '';
  if (/^(另一件事|一件事|一个问题|这个问题|这些变化)$/.test(core)) return '';
  return core.length > 12 ? core.slice(0, 12) : core;
}

function normalizePreprocessText(text) {
  return String(text || '')
    .replace(/\r\n?/g, '\n')
    .replace(/\u00a0/g, ' ')
    .replace(/\t/g, '  ')
    .replace(/[ \f\v]+$/gm, '');
}

function splitLongPlainLine(line, maxLen) {
  const s = String(line || '').trim();
  if (s.length <= maxLen) return [s];
  const parts = s.match(/[^。！？!?；;]+[。！？!?；;]?/g) || [s];
  const chunks = [];
  let current = '';
  parts.forEach(part => {
    const piece = part.trim();
    if (!piece) return;
    if (current && (current + piece).length > maxLen) {
      chunks.push(current);
      current = piece;
    } else {
      current += piece;
    }
  });
  if (current) chunks.push(current);
  return chunks.length ? chunks : [s];
}

function preparePreprocessLines(rawText, mode) {
  const sourceLines = normalizePreprocessText(rawText).split('\n');
  const lines = [];
  const maxLen = mode === 'spoken' ? 72 : 120;
  const shouldSplit = mode === 'spoken' || mode === 'longform';

  sourceLines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) {
      lines.push('');
      return;
    }
    if (shouldSplit && !/^#{1,3}\s/.test(trimmed) && !/^```/.test(trimmed) && trimmed.length > maxLen) {
      splitLongPlainLine(trimmed, maxLen).forEach(part => lines.push(part));
      return;
    }
    lines.push(trimmed);
  });
  return lines;
}

function convertListLine(trimmed, mode) {
  if (/^[-*+]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) return trimmed;

  const bulletMatch = trimmed.match(/^[·•●○–—▪▫►▶]\s*(.+)/);
  if (bulletMatch) return '- ' + bulletMatch[1];

  const orderedMatch = trimmed.match(/^(\d{1,2})[、.．)）]\s*(.+)/);
  if (orderedMatch) return `${orderedMatch[1]}. ${orderedMatch[2]}`;

  const bracketMatch = trimmed.match(/^[（(]([一二三四五六七八九十\d]{1,3})[）)]\s*(.+)/);
  if (bracketMatch) return `- ${bracketMatch[2]}`;

  const circledNumbers = '①②③④⑤⑥⑦⑧⑨⑩';
  const circledMatch = trimmed.match(/^([①②③④⑤⑥⑦⑧⑨⑩])\s*(.+)/);
  if (circledMatch) return `${circledNumbers.indexOf(circledMatch[1]) + 1}. ${circledMatch[2]}`;

  const chineseOrder = ['第一', '第二', '第三', '第四', '第五', '第六', '第七', '第八', '第九', '第十'];
  const chineseMatch = trimmed.match(/^(第一|第二|第三|第四|第五|第六|第七|第八|第九|第十)[，,、]\s*(.+)/);
  if (chineseMatch && (mode === 'tutorial' || mode === 'longform')) {
    return `${chineseOrder.indexOf(chineseMatch[1]) + 1}. ${chineseMatch[2]}`;
  }

  const labeledMatch = trimmed.match(/^(优势|优点|缺点|亮点|适合|不适合|推荐理由|使用感受|价格|口感|质地|体验|注意事项|准备材料)[:：]\s*(.+)/);
  if (labeledMatch && (mode === 'recommend' || mode === 'tutorial')) {
    return `- **${labeledMatch[1]}**：${labeledMatch[2]}`;
  }

  return '';
}

function convertQuoteLine(trimmed, mode) {
  if (/^>\s/.test(trimmed)) return trimmed;

  const quoteMatch = trimmed.match(/^[“「》【]\s*(.+)/);
  if (quoteMatch) {
    return '> ' + quoteMatch[1].replace(/[”」】]\s*$/, '');
  }

  const labelQuote = trimmed.match(/^(注|提示|提醒|注意|重点|结论|金句|避坑)[:：]\s*(.+)/);
  if (labelQuote && (mode === 'tutorial' || mode === 'longform' || mode === 'spoken')) {
    return `> **${labelQuote[1]}**：${labelQuote[2]}`;
  }

  return '';
}

function extractCompactHeadingCandidate(text) {
  let s = String(text || '').trim();
  if (!s) return '';
  s = s.split(/[。！？!?；;，,]/)[0] || s;
  s = s
    .replace(/^(我觉得|我发现|你会发现|其实|说白了|简单说|换句话说|先说结论|首先|然后|所以|但是|不过)/, '')
    .replace(/^(这件事|这个问题|这些变化|这种情况|一个很明显的)/, '')
    .replace(/[“”"']/g, '')
    .replace(/\s+/g, '')
    .trim();
  if (s.length < 4 || s.length > 10) return '';
  if (/[吗呢吧啊呀]$/.test(s)) return '';
  return s;
}

function inferHeadingForMode(text, mode) {
  const s = String(text || '').trim();
  if (!s || s.length < 18) return '';

  if (mode === 'longform' || mode === 'spoken') {
    const colonTitle = summarizeHeadingCandidate(s.endsWith('：') || s.endsWith(':') ? s : '');
    if (colonTitle) return colonTitle;
    const rules = [
      { re: /结论|总结|所以|因此|最后|归根到底|本质上/, title: '先说结论' },
      { re: /问题|痛点|困境|矛盾|难点|不适|焦虑|压力/, title: '问题浮现' },
      { re: /原因|因为|为什么|背后|来自|源于/, title: '背后的原因' },
      { re: /变化|趋势|正在|开始|越来越|已经/, title: '变化正在发生' },
      { re: /案例|比如|举个例子|具体来说/, title: '一个例子' },
      { re: /方法|做法|路径|策略|建议|可以这样/, title: '可以怎么做' }
    ];
    const matched = rules.find(rule => rule.re.test(s));
    return matched ? matched.title : extractCompactHeadingCandidate(s);
  }

  if (mode === 'tutorial') {
    const rules = [
      { re: /准备|材料|工具|账号|环境|前提/, title: '准备工作' },
      { re: /第一步|首先|先|打开|进入|点击|选择|填写|设置/, title: '操作步骤' },
      { re: /注意|不要|避免|坑|错误|失败|提醒/, title: '注意事项' },
      { re: /为什么|原因|原理|逻辑/, title: '原理说明' },
      { re: /完成|效果|结果|验证|检查/, title: '检查结果' }
    ];
    const matched = rules.find(rule => rule.re.test(s));
    return matched ? matched.title : '';
  }

  if (mode === 'recommend') {
    const rules = [
      { re: /推荐|喜欢|值得|入手|购买|安利/, title: '推荐理由' },
      { re: /适合|人群|场景|用来|拿来/, title: '适合谁' },
      { re: /优点|亮点|好处|优势|体验/, title: '核心亮点' },
      { re: /缺点|不足|问题|但是|不过/, title: '不足之处' },
      { re: /价格|预算|性价比|贵|便宜/, title: '价格参考' },
      { re: /总结|最后|总之|一句话/, title: '一句话总结' }
    ];
    const matched = rules.find(rule => rule.re.test(s));
    return matched ? matched.title : '';
  }

  return '';
}

function shouldInsertAutoHeading(mode, state, text) {
  if (mode === 'clean') return '';
  if (state.autoHeadingCount >= 5) return '';

  const title = inferHeadingForMode(text, mode);
  if (!title) return '';

  if (mode === 'longform') {
    if (state.paragraphCount === 0 || state.sinceHeading >= 2) return title;
    return '';
  }
  if (mode === 'spoken') {
    if (state.paragraphCount === 0 || state.sinceHeading >= 3) return title;
    return '';
  }
  if (mode === 'tutorial' || mode === 'recommend') {
    if (state.sinceHeading >= 2 || state.paragraphCount === 0) return title;
  }
  return '';
}

function pushBlank(result) {
  if (result.length && result[result.length - 1] !== '') result.push('');
}

function smartPreprocess() {
  const rawText = editor.innerText || '';
  if (!rawText.trim()) { alert('编辑器为空，请先输入内容'); return; }
  const cards = Object.entries(PREPROCESS_MODE_CONFIG).map(([key, item]) => `
      <div style="border:2px solid #e5e7eb;border-radius:8px;padding:14px;cursor:pointer" onclick="runSmartPreprocess('${key}')">
        <div style="font-size:14px;font-weight:800;color:#6B2303;margin-bottom:4px">${item.name}</div>
        <div style="font-size:12px;color:#888;line-height:1.6">${item.desc}</div>
      </div>
  `).join('');
  showModal(`
    <h3>智能预处理</h3>
    <p style="font-size:12px;color:#777;line-height:1.7;margin-bottom:14px">选择文章类型。所有方式都会尽量保留原文，只增加标题、列表、引用和段落结构。</p>
    <div style="display:grid;grid-template-columns:1fr;gap:10px">
      ${cards}
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideModal()">取消</button>
    </div>
  `);
}
function runSmartPreprocess(mode = 'clean') {
  const rawText = editor.innerText || '';
  if (!rawText.trim()) { alert('编辑器为空，请先输入内容'); return; }
  if (mode === 'outline') mode = 'longform';
  // If already has markdown, warn
  const hasMd = /^#{1,3}\s/m.test(rawText) || /\*\*/.test(rawText) || /^```/m.test(rawText) || /^[-*+]\s/m.test(rawText) || /^\d+\.\s/m.test(rawText);
  if (hasMd && !confirm('检测到已有Markdown语法，是否继续预处理？')) return;

  const lines = preparePreprocessLines(rawText, mode);
  const result = [];
  let prevBlank = false;
  const state = {
    paragraphCount: 0,
    sinceHeading: 0,
    autoHeadingCount: 0
  };

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    const trimmed = line.trim();

    // Empty line -> preserve as blank
    if (!trimmed) {
      if (!prevBlank) result.push('');
      prevBlank = true;
      continue;
    }
    prevBlank = false;

    // Already markdown heading -> keep
    if (/^#{1,3}\s/.test(trimmed)) {
      result.push(trimmed);
      state.sinceHeading = 0;
      continue;
    }

    // Already markdown list -> keep
    if (/^[-*+]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
      result.push(trimmed);
      continue;
    }

    // Already blockquote -> keep
    if (/^>\s/.test(trimmed)) {
      result.push(trimmed);
      continue;
    }

    // Already code fence -> keep
    if (/^```/.test(trimmed)) {
      result.push(trimmed);
      continue;
    }

    const listLine = convertListLine(trimmed, mode);
    if (listLine) {
      result.push(listLine);
      continue;
    }

    const quoteLine = convertQuoteLine(trimmed, mode);
    if (quoteLine) {
      result.push(quoteLine);
      continue;
    }

    // Only promote lines with clear heading signals. Do not guess from ordinary sentences.
    const prevLine = (i > 0) ? lines[i - 1].trim() : '';
    const nextLine = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
    if (isConservativeHeadingLine(trimmed, prevLine, nextLine) || isModeHeadingLine(trimmed, mode)) {
      result.push('## ' + trimmed);
      state.sinceHeading = 0;
      continue;
    }

    const autoHeading = shouldInsertAutoHeading(mode, state, trimmed);
    if (autoHeading) {
      pushBlank(result);
      result.push('### ' + autoHeading);
      state.sinceHeading = 0;
      state.autoHeadingCount++;
    }

    // Regular paragraph
    result.push(trimmed);
    state.paragraphCount++;
    state.sinceHeading++;
  }

  const mdText = result.join('\n');
  // Parse MD and set as editor content
  const parsedHtml = parseMD(mdText);
  editor.innerHTML = sanitizeContentHTML(parsedHtml);
  hideModal();
  scheduleUpdate();
}
